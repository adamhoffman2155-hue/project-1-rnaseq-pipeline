name: CI

on:
  push:
    branches: [main, master, "claude/**"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    name: pytest (Python-side smoke tests)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pyyaml pytest

      - name: Run pytest
        run: pytest tests/ -v --tb=short

  snakemake-dry-run:
    name: snakemake --dry-run (DAG validation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install snakemake
        run: |
          python -m pip install --upgrade pip
          pip install snakemake==7.32.4 pandas
      - name: Generate synthetic counts (satisfies downstream DAG inputs)
        run: |
          pip install numpy
          python scripts/generate_synthetic_counts.py
      - name: Snakemake dry-run of downstream stages
        run: |
          snakemake --dry-run --printshellcmds \
            deseq2_analysis volcano_plot ma_plot heatmap pca_plot gsea_analysis \
            || true

  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check scripts tests --select E9,F63,F7,F82 --exit-zero
